<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <link rel="stylesheet" href="./resources/ol.css">
        <link rel="stylesheet" href="resources/fontawesome-all.min.css">
        <link href="resources/photon-geocoder-autocomplete.min.css" rel="stylesheet">
        <link rel="stylesheet" href="./resources/ol-layerswitcher.css">
        <link rel="stylesheet" href="./resources/qgis2web.css">
        <link rel="stylesheet" href="./resources/dashboard.css">
        <style>
        html, body {
            background-color: #ffffff;
        }
        .ol-control > * {
            background-color: #f8f8f8!important;
            color: #444444!important;
            border-radius: 0px;
        }
        .ol-attribution a, .gcd-gl-input::placeholder, .search-layer-input-search::placeholder {
            color: #444444!important;
        }
        .search-layer-input-search {
            background-color: #f8f8f8!important;
        }
        .ol-control > *:focus, .ol-control >*:hover {
            background-color: rgba(248, 248, 248, 0.7)!important;
        } 
        .ol-control {
            background-color: rgba(255,255,255,.4) !important;
            padding: 2px !important;
        } 
        </style>

        <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
        }
        </style>
        <title>Peta Indeks Pertanamanan Palawija 2025-2026 di Lahan Non Sawah dan Non Perkebunan</title>
    </head>
    <body>
        <div class="dashboard-shell">
            <aside class="dashboard-panel" aria-label="Dashboard layer palawija">
                <div class="dashboard-header">
                    <p>Dashboard Palawija</p>
                    <h1>Indeks Pertanaman 2025-2026</h1>
                </div>
                <div class="layer-tabs" id="dashboard-layer-tabs" role="tablist" aria-label="Pilih layer rekap"></div>
                <div class="kpi-grid" id="dashboard-kpis"></div>
                <div class="chart-panel">
                    <div class="panel-heading">
                        <h2>Luas per Kelas IP</h2>
                        <span id="dashboard-total-label"></span>
                    </div>
                    <div class="bar-chart" id="dashboard-chart"></div>
                </div>
                <div class="table-panel">
                    <div class="panel-heading">
                        <h2>Peringkat Wilayah</h2>
                        <input id="dashboard-search" type="search" placeholder="Cari wilayah">
                    </div>
                    <div class="dashboard-table-wrap">
                        <table class="dashboard-table">
                            <thead>
                                <tr>
                                    <th>Wilayah</th>
                                    <th>Total ha</th>
                                    <th>IP dominan</th>
                                </tr>
                            </thead>
                            <tbody id="dashboard-table"></tbody>
                        </table>
                    </div>
                </div>
            </aside>
            <div id="map">
                <div id="popup" class="ol-popup">
                    <a href="#" id="popup-closer" class="ol-popup-closer"></a>
                    <div id="popup-content"></div>
                </div>
            </div>
        </div>
        <script src="resources/qgis2web_expressions.js"></script>
        <script src="./resources/functions.js"></script>
        <script src="./resources/ol.js"></script>
        <script src="./resources/ol-layerswitcher.js"></script>
        <script src="resources/photon-geocoder-autocomplete.min.js"></script>
        <script src="resources/olms.js"></script>
        <script src="layers/BatasProvinsi_1.js"></script><script src="layers/BatasKabKota_2.js"></script><script src="layers/RekapDesa_4.js"></script><script src="layers/RekapKecamatan_5.js"></script><script src="layers/RekapKabKota_6.js"></script><script src="layers/RekapProvinsi_7.js"></script>
        <script src="styles/BatasProvinsi_1_style.js"></script><script src="styles/BatasKabKota_2_style.js"></script><script src="styles/RekapDesa_4_style.js"></script><script src="styles/RekapKecamatan_5_style.js"></script><script src="styles/RekapKabKota_6_style.js"></script><script src="styles/RekapProvinsi_7_style.js"></script>
        <script src="./layers/layers.js" type="text/javascript"></script> 
        <script src="./resources/Autolinker.min.js"></script>
        <script src="./resources/qgis2web.js"></script>
        <script src="./resources/dashboard.js"></script>        
    </body>
</html>
